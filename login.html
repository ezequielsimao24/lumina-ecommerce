<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumina - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* Login isolado: mantém identidade premium sem alterar o estilo global. */
    .auth-page {
      min-height: 100svh;
      background: #0b0c10;
      color: #ffffff;
      display: grid;
      place-items: center;
      padding: 96px 18px 48px;
      position: relative;
      overflow: hidden;
    }

    .auth-page::before {
      content: "";
      position: absolute;
      inset: -40px;
      background:
        radial-gradient(circle at 15% 10%, rgba(165, 180, 252, 0.18), transparent 55%),
        radial-gradient(circle at 80% 25%, rgba(56, 189, 248, 0.12), transparent 52%),
        radial-gradient(circle at 45% 85%, rgba(99, 102, 241, 0.18), transparent 55%);
      pointer-events: none;
    }

    .auth-card {
      position: relative;
      width: 100%;
      max-width: 520px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      box-shadow: 0 26px 80px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 26px;
    }

    .auth-brand {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .auth-brand .brand {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 28px;
      letter-spacing: -0.5px;
      font-weight: 700;
    }

    .auth-brand .tag {
      color: rgba(165, 180, 252, 0.9);
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .auth-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 26px;
      margin-bottom: 8px;
    }

    .auth-subtitle {
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 22px;
    }

    .auth-panel {
      display: none;
    }

    .auth-panel.active {
      display: block;
    }

    .auth-field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 14px;
    }

    .auth-field label {
      font-size: 12px;
      font-weight: 800;
      color: rgba(148, 163, 184, 0.95);
      letter-spacing: 0.2px;
    }

    .auth-input {
      width: 100%;
      border: 1px solid rgba(226, 232, 240, 0.25);
      border-radius: 12px;
      background: rgba(248, 250, 252, 0.06);
      color: #ffffff;
      padding: 12px 12px;
      font: inherit;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .auth-input::placeholder {
      color: rgba(148, 163, 184, 0.65);
    }

    .auth-input:focus {
      border-color: rgba(56, 189, 248, 0.65);
      box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.14);
    }

    .auth-password-wrap {
      position: relative;
    }

    .toggle-visibility-btn {
      position: absolute;
      top: 50%;
      right: 10px;
      transform: translateY(-50%);
      border: 0;
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      border-radius: 999px;
      padding: 8px 10px;
      cursor: pointer;
      font-weight: 700;
      font-size: 12px;
      transition: transform 0.15s ease, background 0.2s ease;
    }

    .toggle-visibility-btn:hover {
      background: rgba(255, 255, 255, 0.14);
      transform: translateY(-50%) scale(1.02);
    }

    .auth-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 10px;
    }

    .auth-link {
      color: rgba(165, 180, 252, 0.95);
      font-weight: 700;
      font-size: 13px;
      text-decoration: none;
      opacity: 0.95;
    }

    .auth-link:hover {
      opacity: 1;
      text-decoration: underline;
    }

    .btn-auth {
      width: 100%;
      border: 0;
      border-radius: 999px;
      background: #ffffff;
      color: #0b0c10;
      padding: 14px 18px;
      cursor: pointer;
      font-weight: 800;
      font-size: 14px;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.25);
      margin-top: 14px;
    }

    .btn-auth:hover {
      transform: translateY(-2px);
      background: #f1f5f9;
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.35);
    }

    .auth-switch {
      margin-top: 18px;
      text-align: center;
      color: rgba(148, 163, 184, 0.95);
      font-size: 13px;
    }

    .auth-switch button {
      border: 0;
      background: transparent;
      color: rgba(56, 189, 248, 0.95);
      cursor: pointer;
      font-weight: 800;
      font-size: 13px;
      text-decoration: underline;
    }

    .auth-error {
      margin-top: 10px;
      color: #fca5a5;
      font-weight: 700;
      font-size: 13px;
      min-height: 18px;
    }

    @media (max-width: 480px) {
      .auth-card {
        padding: 18px;
        border-radius: 16px;
      }

      .auth-brand {
        margin-bottom: 14px;
      }
    }
  </style>
</head>

<body>
  <main class="auth-page">
    <section class="auth-card" aria-label="Autenticacao Lumina">
      <header class="auth-brand">
        <div class="brand">Lumina</div>
        <div class="tag">MODA • VESTUARIO</div>
      </header>

      <!-- LOGIN -->
      <section class="auth-panel active" id="loginPanel">
        <h2 class="auth-title">Entrar</h2>
        <p class="auth-subtitle">Acesse sua conta para finalizar compras com mais rapidez.</p>

        <form id="loginForm" novalidate>
          <div class="auth-field">
            <label for="loginEmail">E-mail</label>
            <input class="auth-input" type="email" id="loginEmail" name="email" placeholder="seuemail@dominio.com" required />
          </div>

          <div class="auth-field">
            <label for="loginPassword">Senha</label>
            <div class="auth-password-wrap">
              <input class="auth-input" type="password" id="loginPassword" name="password" placeholder="••••••••" required />
              <button class="toggle-visibility-btn" type="button" data-toggle-password="loginPassword" aria-label="Mostrar/ocultar senha">
                Mostrar
              </button>
            </div>
          </div>

          <div class="auth-actions">
            <a class="auth-link" href="#" id="forgotPasswordLink">Esqueci a senha</a>
          </div>

          <button class="btn-auth" type="submit">Entrar</button>

          <div class="auth-error" id="loginError" role="alert" aria-live="polite"></div>
        </form>

        <div class="auth-switch">
          Não tem conta?
          <button type="button" id="goToRegisterBtn">Criar conta</button>
        </div>
      </section>

      <!-- CADASTRO -->
      <section class="auth-panel" id="registerPanel">
        <h2 class="auth-title">Criar conta</h2>
        <p class="auth-subtitle">Crie sua conta para acompanhar pedidos e salvar favoritos.</p>

        <form id="registerForm" novalidate>
          <div class="auth-field">
            <label for="registerName">Nome Completo</label>
            <input class="auth-input" type="text" id="registerName" name="fullName" placeholder="Seu nome" required />
          </div>

          <div class="auth-field">
            <label for="registerEmail">E-mail</label>
            <input class="auth-input" type="email" id="registerEmail" name="email" placeholder="seuemail@dominio.com" required />
          </div>

          <div class="auth-field">
            <label for="registerPassword">Senha</label>
            <div class="auth-password-wrap">
              <input class="auth-input" type="password" id="registerPassword" name="password" placeholder="••••••••" required />
              <button class="toggle-visibility-btn" type="button" data-toggle-password="registerPassword" aria-label="Mostrar/ocultar senha">
                Mostrar
              </button>
            </div>
          </div>

          <div class="auth-field">
            <label for="registerConfirmPassword">Confirmação de Senha</label>
            <div class="auth-password-wrap">
              <input class="auth-input" type="password" id="registerConfirmPassword" name="confirmPassword" placeholder="••••••••" required />
              <button class="toggle-visibility-btn" type="button" data-toggle-password="registerConfirmPassword" aria-label="Mostrar/ocultar senha">
                Mostrar
              </button>
            </div>
          </div>

          <button class="btn-auth" type="submit">Cadastrar</button>

          <div class="auth-error" id="registerError" role="alert" aria-live="polite"></div>
        </form>

        <div class="auth-switch">
          Já tem conta?
          <button type="button" id="goToLoginBtn">Voltar para login</button>
        </div>
      </section>
    </section>
  </main>

  <script src="js/script.js"></script>
</body>

</html>
